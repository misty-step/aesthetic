name: ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run ci
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: law-screens
          path: test-results/screens/
          if-no-files-found: ignore
