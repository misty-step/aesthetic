name: Release

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      # Landmark: Automated semantic-release pipeline
      # https://github.com/misty-step/landmark
      # The repo-local .releaserc.json adds a @semantic-release/exec prepare
      # step that runs scripts/prepare-release.mjs — bumping every version
      # pin (aesthetic.css, tokens.json, README.md, …) and regenerating
      # build artifacts (registry, feed, recipes, tokens) BEFORE the git
      # commit + tag. This keeps all pins in sync with the release version.
      - name: Run Landmark
        id: landmark
        uses: misty-step/landmark@v1
        with:
          github-token: ${{ secrets.GH_RELEASE_TOKEN }}
          llm-api-key: ${{ secrets.OPENROUTER_API_KEY }}

      # Landmark writes release notes (docs/releases/*.md/.txt/.html/.json)
      # AFTER semantic-release commits, so they're not in the release commit.
      # Commit them back so links from the feed/site resolve on master.
      - name: Commit release notes artifacts
        if: steps.landmark.outcome == 'success'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GH_RELEASE_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          git add docs/releases/ || true
          if git diff --cached --quiet; then
            echo "No release notes artifacts to commit"
            exit 0
          fi
          git commit -m "chore(release): publish release notes artifacts [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
